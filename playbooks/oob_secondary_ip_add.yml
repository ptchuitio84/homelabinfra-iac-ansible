# =============================================================================
# playbooks/oob_secondary_ip_add.yml — Add secondary IP to OOB VLAN2 SVI
# =============================================================================
# TEMPORARY — adds 10.2.0.5/24 as a secondary IP to interface Vlan2 so the
# OOB management interfaces (currently misconfigured to 10.2.0.5) can be
# reached and reconfigured to their correct IPs.
#
# After reconfiguring OOB interfaces, run oob_secondary_ip_remove.yml to
# clean this up.
#
# USAGE:
#   ansible-playbook playbooks/oob_secondary_ip_add.yml --check   # dry run
#   ansible-playbook playbooks/oob_secondary_ip_add.yml
# =============================================================================

---
- name: Add 10.2.0.5 secondary IP to Vlan2 (OOB) — temporary
  hosts: swplnet251.nnt.com
  gather_facts: false

  tasks:
    - name: Add secondary IP 10.2.0.5/24 to interface Vlan2
      cisco.ios.ios_config:
        lines:
          - ip address 10.2.0.5 255.255.255.0 secondary
        parents: interface Vlan2
      notify: Save running config

  handlers:
    - name: Save running config
      cisco.ios.ios_command:
        commands:
          - command: write memory

# =============================================================================
# playbooks/network_backup.yml — Back Up All Network Device Configurations
# =============================================================================
# PURPOSE:
# Pulls the running configuration from every network device and saves it as a
# timestamped text file in network/backups/. Use this before any change window,
# and schedule it to run daily for a configuration audit trail.
#
# This playbook is READ-ONLY — it makes no changes to any device.
# Safe to run at any time without risk.
#
# USAGE:
#   # Back up everything:
#   ansible-playbook playbooks/network_backup.yml
#
#   # Back up Cisco only:
#   ansible-playbook playbooks/network_backup.yml --limit cisco_switches
#
#   # Back up Arista only:
#   ansible-playbook playbooks/network_backup.yml --limit arista_switches
#
# OUTPUT:
#   network/backups/<hostname>_<YYYY-MM-DD>.txt
#   Example: network/backups/swplnet251.nnt.com_2026-04-04.txt
#
# VAULT REQUIRED: yes — credentials are encrypted in group_vars/*/vault.yml
# =============================================================================

---
# ── CISCO SWITCHES ────────────────────────────────────────────────────────────
- name: Backup Cisco IOS running configurations
  hosts: cisco_switches
  gather_facts: false  # skip OS fact collection — not needed for show commands

  tasks:
    # "show running-config" pulls the full active configuration from the switch.
    # The result is stored in the "ios_config" variable for the next task.
    - name: Retrieve running config from switch
      cisco.ios.ios_command:
        commands: show running-config
      register: ios_config

    # Write the config to a local file on the control node (delegate_to: localhost).
    # The filename includes the date so multiple backups coexist without overwriting.
    - name: Save config to timestamped backup file
      ansible.builtin.copy:
        content: "{{ ios_config.stdout[0] }}"
        dest: "{{ playbook_dir }}/../network/backups/{{ inventory_hostname }}_{{ lookup('pipe', 'date +%Y-%m-%d') }}.txt"
      delegate_to: localhost  # write the file on the control node, not the switch

# ── ARISTA SWITCHES ───────────────────────────────────────────────────────────
- name: Backup Arista EOS running configurations
  hosts: arista_switches
  gather_facts: false
  ignore_errors: true   # Arista switch not yet in service — skip without failing

  tasks:
    # "show running-config" on EOS returns the full active config via eAPI.
    - name: Retrieve running config from switch
      arista.eos.eos_command:
        commands: show running-config
      register: eos_config

    # Save to a local file. Same naming pattern as Cisco for consistency.
    - name: Save config to timestamped backup file
      ansible.builtin.copy:
        content: "{{ eos_config.stdout[0] }}"
        dest: "{{ playbook_dir }}/../network/backups/{{ inventory_hostname }}_{{ lookup('pipe', 'date +%Y-%m-%d') }}.txt"
      delegate_to: localhost

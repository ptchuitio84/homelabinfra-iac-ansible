---
# vrrp_validate.yml — Verify VRRP state on both Arista switches
#
# Expected state:
#   swplnet252 (7050SX) = MASTER  on all VLANs  (priority 110)
#   swplnet251 (7048T-A) = BACKUP on all VLANs  (priority 90)
#
# Usage:
#   ansible-playbook playbooks/vrrp_validate.yml
#
# Run this after 7048T-A is cabled and EOS config is pushed.

- name: Validate VRRP state
  hosts: arista_switches
  gather_facts: false

  tasks:
    - name: Get VRRP summary
      arista.eos.eos_command:
        commands: show vrrp brief
      register: vrrp_output

    - name: Display VRRP summary
      ansible.builtin.debug:
        msg: |
          === {{ inventory_hostname }} VRRP State ===
          {{ vrrp_output.stdout[0] }}

    - name: Assert 7050SX is Master on all groups
      ansible.builtin.assert:
        that: "vrrp_output.stdout[0] is not search('Backup')"
        fail_msg: "{{ inventory_hostname }} has VRRP groups in Backup state — expected Master"
        success_msg: "{{ inventory_hostname }} is Master on all VRRP groups"
      when: inventory_hostname == 'swplnet252'

    - name: Assert 7048T-A is Backup on all groups
      ansible.builtin.assert:
        that: "vrrp_output.stdout[0] is not search('Master')"
        fail_msg: "{{ inventory_hostname }} has VRRP groups in Master state — expected Backup"
        success_msg: "{{ inventory_hostname }} is Backup on all VRRP groups"
      when: inventory_hostname == 'swplnet251_arista'

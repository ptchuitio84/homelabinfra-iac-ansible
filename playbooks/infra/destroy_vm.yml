# =============================================================================
# playbooks/infra/destroy_vm.yml — Remove VM from vCenter
# =============================================================================
# Powers off and deletes a VM from vCenter. Called on pipeline failure to
# clean up partially built VMs.
#
# USAGE:
#   ansible-playbook playbooks/infra/destroy_vm.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt \
#     --extra-vars "vm_name=hmvlapweb001"
# =============================================================================

---
- name: Destroy VM — {{ vm_name }}
  hosts: vcenter
  gather_facts: false

  # Hardcode vcenter vars as fallback — group_vars/vcenter/vars.yml may not
  # load in all execution contexts (e.g. Jenkins post-failure cleanup).
  vars:
    vcenter_hostname:       "{{ hostvars[inventory_hostname]['ansible_host'] }}"
    vcenter_username:       "{{ vault_vcenter_username }}"
    vcenter_password:       "{{ vault_vcenter_password }}"
    vcenter_validate_certs: false
    vcenter_datacenter:     NNTDC

  tasks:

    - name: Power off and delete VM {{ vm_name }}
      community.vmware.vmware_guest:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs }}"
        datacenter: "{{ vcenter_datacenter }}"
        name: "{{ vm_name }}"
        state: absent
        force: true
      delegate_to: localhost

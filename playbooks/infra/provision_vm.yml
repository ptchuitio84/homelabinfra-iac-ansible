# =============================================================================
# playbooks/provision_vm.yml — Zero-Touch VM Provisioner
# =============================================================================
# PURPOSE:
# Clones a VM from the golden template (PLTMPOL0903302026), sets hostname
# and static IP via VMware Guest Customization, and waits for SSH to be ready.
# No manual touches required — run this, walk away, come back to a live VM.
#
# PREREQUISITES:
#   1. vCenter credentials in inventory/group_vars/vcenter/vault.yml (encrypted)
#   2. Target ESXi host reachable from control node
#   3. Template PLTMPOL0903302026 exists in vCenter
#
# USAGE:
#   ansible-playbook playbooks/provision_vm.yml \
#     --extra-vars "
#       vm_name=hmvlapmon001
#       vm_hostname=hmvlapmon001
#       vm_ip=10.10.1.51
#       vm_esxi_host=hmvlesxi001.nnt.com
#       vm_datastore=datastore1
#       vm_vcpus=2
#       vm_memory_mb=4096
#     "
#
# AFTER THIS COMPLETES:
#   Run the service playbook against the new VM:
#     ansible-playbook playbooks/setup_prometheus.yml --limit hmvlapmon001.nnt.com
#
# VARIABLES (all overridable via --extra-vars):
#   vm_name        — VM name in vCenter
#   vm_hostname    — OS hostname (without domain)
#   vm_ip          — Static IP address
#   vm_esxi_host   — Target ESXi host FQDN
#   vm_datastore   — Target datastore name
#   vm_vcpus       — Number of vCPUs (default: 2)
#   vm_memory_mb   — RAM in MB (default: 4096)
# =============================================================================

---
- name: Provision VM from template
  hosts: vcenter         # Targets vCenter — API calls run via delegate_to: localhost
  gather_facts: false    # No SSH into vCenter — skip fact collection

  roles:
    - provision_vm

  post_tasks:
    - name: Register new VM in dynamic inventory for post-provision plays
      ansible.builtin.add_host:
        name: "{{ vm_ip }}"
        groups: new_vm
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Inject Ansible control node SSH key
  hosts: new_vm
  gather_facts: false
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

  tasks:
    - name: Add ans001 public key to authorized_keys
      ansible.posix.authorized_key:
        user: root
        key: "{{ ansible_control_ssh_pubkey }}"
        state: present

# =============================================================================
# PLAY 3: ENFORCE STATIC NETWORK CONFIG
# VMware Guest Customization sets the IP at first boot but does not always
# create a persistent NetworkManager connection profile on OL9. This play
# uses nmcli to write a proper NM keyfile that survives all future reboots.
# Fixes: ipv4.method reverting to auto after reboot (seen on multiple VMs).
# =============================================================================
- name: Enforce persistent static network configuration
  hosts: new_vm
  gather_facts: false
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

  tasks:
    # Delete any leftover DHCP/auto connections on the same interface.
    # VMware clones leave a bare "ens192" (ipv4.method auto) alongside the
    # "System ens192" Guest Customization creates. NM can activate the DHCP
    # one on reboot, wiping the static IP. Delete it — only one connection
    # per interface.
    - name: Remove duplicate DHCP connections on ethernet interfaces
      ansible.builtin.shell: |
        nmcli -t -f NAME,TYPE con show \
          | awk -F: '/ethernet/{print $1}' \
          | while IFS= read -r CONN; do
              METHOD=$(nmcli -t -f ipv4.method con show "$CONN" 2>/dev/null | awk -F: '{print $2}')
              [ "$METHOD" = "auto" ] && nmcli con delete "$CONN"
            done
      changed_when: true
      failed_when: false

    - name: Lock in static IP via nmcli
      ansible.builtin.shell: |
        set -e
        CONN=$(nmcli -t -f NAME,TYPE con show | awk -F: '/ethernet/{print $1; exit}')
        nmcli con mod "$CONN" \
          ipv4.method manual \
          ipv4.addresses "{{ vm_ip }}/{{ vm_prefix }}" \
          ipv4.gateway "{{ vm_gateway }}" \
          ipv4.dns "{{ vm_dns_servers | join(',') }}" \
          connection.autoconnect yes
        nmcli con up "$CONN"
      changed_when: true

    - name: Confirm network config is persisted
      ansible.builtin.debug:
        msg: "Static IP {{ vm_ip }}/{{ vm_prefix }} locked in — duplicate DHCP connections removed"

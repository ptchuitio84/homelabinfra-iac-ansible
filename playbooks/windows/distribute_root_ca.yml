# =============================================================================
# playbooks/windows/distribute_root_ca.yml — CA Cert Fleet Distribution
# =============================================================================
# PURPOSE:
#   Distributes the NNT Root CA and Sub-CA certs to all managed hosts so
#   that any cert signed by NNT-NANONETECH-Sub-CA is trusted natively.
#
#   After this runs:
#   - All Linux hosts: certs in /etc/pki/ca-trust/source/anchors/, update-ca-trust run
#   - All Windows hosts: Root CA in LocalMachine\Root, Sub-CA in LocalMachine\CA
#   - validate_certs: true works in Ansible uri module
#   - Terraform vault provider skips skip_tls_verify
#   - Browsers on domain Windows machines trust internal certs
#
# SOURCE FILES (committed to repo — public certs, not sensitive):
#   files/pki/root_ca.pem   — CN=NNT-NANONETECH-CA (Root, self-signed, 2046)
#   files/pki/subca_new.pem — CN=NNT-NANONETECH-Sub-CA (Intermediate, 2031)
#
# TARGETS:
#   Linux:   all managed Linux host groups
#   Windows: hmvwapdc001, hmvwapdc002, hmvwapex001
#   Skip:    HMVWAPCA001 (offline), HMVWAPCA002 (already trusts its own chain)
#
# USAGE:
#   ansible-playbook playbooks/windows/distribute_root_ca.yml \
#     -i inventory/ --vault-password-file /root/.ansible/vault_pass.txt
# =============================================================================

---

# =============================================================================
# PLAY 1: Distribute Root CA + Sub-CA to all Linux hosts
# =============================================================================
- name: Distribute CA certs to Linux hosts
  hosts: >-
    ansible_nodes:
    monitoring:
    jenkins:
    nfs_servers:
    registry:
    vault_servers:
    k8s_nodes:
    netbox:
    webservers:
    terraform_nodes
  serial: 0
  gather_facts: false
  ignore_unreachable: true
  any_errors_fatal: false

  tasks:

    - name: Ensure ca-trust anchors directory exists
      ansible.builtin.file:
        path: /etc/pki/ca-trust/source/anchors
        state: directory
        mode: '0755'

    - name: Deploy Root CA cert
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../files/pki/root_ca.pem"
        dest: /etc/pki/ca-trust/source/anchors/NNT-NANONETECH-CA.crt
        owner: root
        group: root
        mode: '0644'
      register: root_ca_copy

    - name: Deploy Sub-CA cert
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../files/pki/subca_new.pem"
        dest: /etc/pki/ca-trust/source/anchors/NNT-NANONETECH-Sub-CA.crt
        owner: root
        group: root
        mode: '0644'
      register: sub_ca_copy

    - name: Update ca-trust store
      ansible.builtin.command: update-ca-trust extract
      when: root_ca_copy.changed or sub_ca_copy.changed
      changed_when: true

    - name: Verify Root CA is trusted
      ansible.builtin.shell: "openssl x509 -noout -subject -in /etc/pki/ca-trust/source/anchors/NNT-NANONETECH-CA.crt | grep -i NANONETECH"
      register: verify_root
      changed_when: false
      failed_when: verify_root.rc != 0

    - name: Verify Sub-CA is trusted
      ansible.builtin.shell: "openssl x509 -noout -subject -in /etc/pki/ca-trust/source/anchors/NNT-NANONETECH-Sub-CA.crt | grep -i NANONETECH"
      register: verify_sub
      changed_when: false
      failed_when: verify_sub.rc != 0


# =============================================================================
# PLAY 2: Distribute Root CA + Sub-CA to Windows hosts
# =============================================================================
- name: Distribute CA certs to Windows hosts
  hosts:
    - hmvwapdc001.nanonetech.com
    - hmvwapdc002.nanonetech.com
    - hmvwapex001.nanonetech.com
  gather_facts: false
  ignore_unreachable: true
  any_errors_fatal: false

  tasks:

    - name: Ensure C:\Temp exists
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Copy Root CA PEM to Windows host
      ansible.windows.win_copy:
        src: "{{ playbook_dir }}/../../files/pki/root_ca.pem"
        dest: C:\Temp\NNT-NANONETECH-CA.pem

    - name: Copy Sub-CA PEM to Windows host
      ansible.windows.win_copy:
        src: "{{ playbook_dir }}/../../files/pki/subca_new.pem"
        dest: C:\Temp\NNT-NANONETECH-Sub-CA.pem

    - name: Install Root CA into LocalMachine\Root store
      ansible.windows.win_certificate_store:
        path: C:\Temp\NNT-NANONETECH-CA.pem
        state: present
        store_location: LocalMachine
        store_name: Root

    - name: Install Sub-CA into LocalMachine\CA (Intermediate) store
      ansible.windows.win_certificate_store:
        path: C:\Temp\NNT-NANONETECH-Sub-CA.pem
        state: present
        store_location: LocalMachine
        store_name: CA

    - name: Clean up temp cert files
      ansible.windows.win_file:
        path: "{{ item }}"
        state: absent
      loop:
        - C:\Temp\NNT-NANONETECH-CA.pem
        - C:\Temp\NNT-NANONETECH-Sub-CA.pem

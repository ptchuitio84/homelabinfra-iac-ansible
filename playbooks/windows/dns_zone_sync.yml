# =============================================================================
# playbooks/windows/dns_zone_sync.yml — Sync DNS A records across zones
# =============================================================================
# Copies all A records from dns_source_zone into each dns_target_zones entry.
# Source zone is the single source of truth — manage records there only.
#
# Sync logic (per target zone):
#   - Record missing in target  → create it
#   - Record exists, IP differs → update it
#   - Record exists, IP matches → skip (idempotent)
#   - Record in target only     → left alone (no deletion)
#
# Add new domains by appending to dns_target_zones in group_vars/ad_dns_sync/vars.yml.
#
# USAGE:
#   ansible-playbook playbooks/windows/dns_zone_sync.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt
#
#   # Dry run (shows what would change):
#   ansible-playbook playbooks/windows/dns_zone_sync.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt \
#     --check
#
# SCHEDULE: Run via Jenkins on a cron — see jenkins/windows/nnt-jkn-win-dns-sync.groovy
# VAULT REQUIRED: yes (vault_windows_admin_user / vault_windows_admin_password)
# =============================================================================

---
- name: Sync DNS A and CNAME records — {{ dns_source_zone }} → {{ dns_target_zones | join(', ') }}
  hosts: ad_dns_sync
  gather_facts: false

  tasks:

    - name: Sync A records from {{ dns_source_zone }} to target zones
      check_mode: false  # PowerShell handles dry-run logic itself via $ansible_check_mode
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'

          $sourceZone  = "{{ dns_source_zone }}"
          $targetZones = @("{{ dns_target_zones | join('", "') }}")

          # Pull all A records from source zone
          $sourceRecords = Get-DnsServerResourceRecord -ZoneName $sourceZone -RRType A |
              Where-Object { $_.HostName -ne '@' }  # skip zone apex

          $results = @()

          foreach ($targetZone in $targetZones) {
              Write-Output "--- Syncing $sourceZone → $targetZone ---"

              foreach ($record in $sourceRecords) {
                  $hostname = $record.HostName.TrimEnd('.')
                  $srcIP    = $record.RecordData.IPv4Address.ToString()

                  $existing = Get-DnsServerResourceRecord `
                      -ZoneName $targetZone `
                      -Name $hostname `
                      -RRType A `
                      -ErrorAction SilentlyContinue

                  if (-not $existing) {
                      if (-not ${{ ansible_check_mode | lower }}) {
                          Add-DnsServerResourceRecordA `
                              -ZoneName $targetZone `
                              -Name $hostname `
                              -IPv4Address $srcIP `
                              -TimeToLive 00:05:00
                      }
                      $results += "[ADDED]   $targetZone — $hostname -> $srcIP"
                  }
                  elseif ($existing.RecordData.IPv4Address.ToString() -ne $srcIP) {
                      $dstIP = $existing.RecordData.IPv4Address.ToString()
                      if (-not ${{ ansible_check_mode | lower }}) {
                          Remove-DnsServerResourceRecord `
                              -ZoneName $targetZone `
                              -Name $hostname `
                              -RRType A `
                              -Force
                          Add-DnsServerResourceRecordA `
                              -ZoneName $targetZone `
                              -Name $hostname `
                              -IPv4Address $srcIP `
                              -TimeToLive 00:05:00
                      }
                      $results += "[UPDATED] $targetZone — $hostname $dstIP -> $srcIP"
                  }
                  else {
                      $results += "[OK]      $targetZone — $hostname -> $srcIP"
                  }
              }
          }

          # Summary output
          Write-Output ""
          Write-Output "=== A Record Sync Summary ==="
          $results | ForEach-Object { Write-Output $_ }
          Write-Output ""
          $added   = ($results | Where-Object { $_ -match '^\[ADDED\]'   }).Count
          $updated = ($results | Where-Object { $_ -match '^\[UPDATED\]' }).Count
          $ok      = ($results | Where-Object { $_ -match '^\[OK\]'      }).Count
          Write-Output "Added: $added  Updated: $updated  Unchanged: $ok"
      register: dns_sync_a_result
      changed_when: "'[ADDED]' in dns_sync_a_result.output | join or '[UPDATED]' in dns_sync_a_result.output | join"

    - name: DNS A record sync output
      ansible.builtin.debug:
        msg: "{{ dns_sync_a_result.output }}"

    - name: Sync CNAME records from {{ dns_source_zone }} to target zones
      check_mode: false
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'

          $sourceZone  = "{{ dns_source_zone }}"
          $targetZones = @("{{ dns_target_zones | join('", "') }}")

          # Pull all CNAME records from source zone
          $sourceRecords = Get-DnsServerResourceRecord -ZoneName $sourceZone -RRType CName |
              Where-Object { $_.HostName -ne '@' }  # skip zone apex

          $results = @()

          foreach ($targetZone in $targetZones) {
              Write-Output "--- Syncing CNAMEs $sourceZone → $targetZone ---"

              foreach ($record in $sourceRecords) {
                  $hostname  = $record.HostName.TrimEnd('.')
                  $srcTarget = $record.RecordData.HostNameAlias.TrimEnd('.')

                  $existing = Get-DnsServerResourceRecord `
                      -ZoneName $targetZone `
                      -Name $hostname `
                      -RRType CName `
                      -ErrorAction SilentlyContinue

                  if (-not $existing) {
                      if (-not ${{ ansible_check_mode | lower }}) {
                          Add-DnsServerResourceRecordCName `
                              -ZoneName $targetZone `
                              -Name $hostname `
                              -HostNameAlias "$srcTarget." `
                              -TimeToLive 00:05:00
                      }
                      $results += "[ADDED]   $targetZone — $hostname -> $srcTarget"
                  }
                  elseif ($existing.RecordData.HostNameAlias.TrimEnd('.') -ne $srcTarget) {
                      $dstTarget = $existing.RecordData.HostNameAlias.TrimEnd('.')
                      if (-not ${{ ansible_check_mode | lower }}) {
                          Remove-DnsServerResourceRecord `
                              -ZoneName $targetZone `
                              -Name $hostname `
                              -RRType CName `
                              -Force
                          Add-DnsServerResourceRecordCName `
                              -ZoneName $targetZone `
                              -Name $hostname `
                              -HostNameAlias "$srcTarget." `
                              -TimeToLive 00:05:00
                      }
                      $results += "[UPDATED] $targetZone — $hostname $dstTarget -> $srcTarget"
                  }
                  else {
                      $results += "[OK]      $targetZone — $hostname -> $srcTarget"
                  }
              }
          }

          # Summary output
          Write-Output ""
          Write-Output "=== CNAME Sync Summary ==="
          $results | ForEach-Object { Write-Output $_ }
          Write-Output ""
          $added   = ($results | Where-Object { $_ -match '^\[ADDED\]'   }).Count
          $updated = ($results | Where-Object { $_ -match '^\[UPDATED\]' }).Count
          $ok      = ($results | Where-Object { $_ -match '^\[OK\]'      }).Count
          Write-Output "Added: $added  Updated: $updated  Unchanged: $ok"
      register: dns_sync_cname_result
      changed_when: "'[ADDED]' in dns_sync_cname_result.output | join or '[UPDATED]' in dns_sync_cname_result.output | join"

    - name: DNS CNAME sync output
      ansible.builtin.debug:
        msg: "{{ dns_sync_cname_result.output }}"

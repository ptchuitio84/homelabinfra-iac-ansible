# =============================================================================
# playbooks/network/enforce_baseline_swplnet251.yml
# =============================================================================
# Enforces the baseline config on swplnet251 (Cisco Catalyst 3750G).
#
# Compares the running config against the baseline file and pushes only the
# lines that differ. If the switch is already compliant, no changes are made.
# Saves to startup-config only if changes were applied.
#
# Baseline: network/cisco_catalyst_3750g_swplnet001.txt
#
# USAGE:
#   ansible-playbook playbooks/network/enforce_baseline_swplnet251.yml \
#     --vault-password-file ~/.vault_pass
#
#   Dry run (check what would change without applying):
#   ansible-playbook playbooks/network/enforce_baseline_swplnet251.yml \
#     --vault-password-file ~/.vault_pass --check
# =============================================================================

---
- name: Enforce baseline config — swplnet251 (Cisco 3750G)
  hosts: swplnet251.nnt.com
  gather_facts: false

  vars:
    network_configs_repo: "{{ lookup('env', 'NETWORK_CONFIGS_REPO') | default('/opt/homelabinfra-network-configs', true) }}"
    config_file: "{{ network_configs_repo }}/cisco_catalyst_3750g_swplnet001.txt"
    backup_dir:  "{{ network_configs_repo }}/backups"

  tasks:

    - name: Verify baseline config file exists
      ansible.builtin.stat:
        path: "{{ config_file }}"
      register: config_stat
      delegate_to: localhost

    - name: Abort if baseline file is missing
      ansible.builtin.fail:
        msg: "Baseline not found: {{ config_file }}"
      when: not config_stat.stat.exists

    - name: Capture running config (pre-enforcement backup)
      cisco.ios.ios_command:
        commands: show running-config
      register: pre_backup

    - name: Save pre-enforcement backup to disk
      ansible.builtin.copy:
        content: "{{ pre_backup.stdout[0] }}"
        dest: "{{ backup_dir }}/{{ inventory_hostname }}_pre-enforce_{{ lookup('pipe', 'date +%Y-%m-%d_%H%M') }}.txt"
      delegate_to: localhost

    - name: Enforce baseline — push only deltas
      cisco.ios.ios_config:
        src:   "{{ config_file }}"
        match: none
      register: enforce_result
      notify: Save running config

    - name: Report enforcement result
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} —
          {% if enforce_result.changed %}CHANGES APPLIED ({{ enforce_result.updates | length }} lines pushed)
          {% else %}COMPLIANT — no changes needed{% endif %}

  handlers:
    - name: Save running config
      cisco.ios.ios_command:
        commands:
          - command: write memory

# =============================================================================
# playbooks/network/enforce_baseline_swplnet253.yml
# =============================================================================
# Enforces the baseline config on swplnet253 (Arista 7048T-A).
#
# Compares the running config against the baseline file and pushes only the
# lines that differ. If the switch is already compliant, no changes are made.
# Saves to startup-config only if changes were applied.
#
# Baseline: network/arista_7048t_swplnet253.eos
#
# NOTE: swplnet253 runs EOS 4.12 which rejects the arista.eos collection's
# pre-flight "show version | json" check. All tasks use netcommon cli_command
# and cli_config (raw SSH) instead of arista.eos modules.
#
# USAGE:
#   ansible-playbook playbooks/network/enforce_baseline_swplnet253.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt
#
#   Dry run (check what would change without applying):
#   ansible-playbook playbooks/network/enforce_baseline_swplnet253.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt --check
# =============================================================================

---
- name: Enforce baseline config — swplnet253 (Arista 7048T-A)
  hosts: swplnet253.nnt.com
  gather_facts: false

  vars:
    network_configs_repo: "{{ lookup('env', 'NETWORK_CONFIGS_REPO') | default('/opt/homelabinfra-network-configs', true) }}"
    config_file: "{{ network_configs_repo }}/arista_7048t_swplnet253.eos"
    backup_dir:  "{{ network_configs_repo }}/backups"

  tasks:

    - name: Verify baseline config file exists
      ansible.builtin.stat:
        path: "{{ config_file }}"
      register: config_stat
      delegate_to: localhost

    - name: Abort if baseline file is missing
      ansible.builtin.fail:
        msg: "Baseline not found: {{ config_file }}"
      when: not config_stat.stat.exists

    # cli_command returns stdout as a string (not a list) — no [0] index needed.
    - name: Capture running config (pre-enforcement backup)
      ansible.netcommon.cli_command:
        command: show running-config
      register: pre_backup

    - name: Save pre-enforcement backup to disk
      ansible.builtin.copy:
        content: "{{ pre_backup.stdout }}"
        dest: "{{ backup_dir }}/{{ inventory_hostname }}_pre-enforce_{{ lookup('pipe', 'date +%Y-%m-%d_%H%M') }}.txt"
      delegate_to: localhost

    # EOS 4.12 workaround: cli_config internally runs "show version | json"
    # to detect configure-session support (EOS 4.20+). On EOS 4.12 over SSH
    # this causes /bin/sh to interpret "json" as a shell command and fail.
    # Push config manually: configure terminal → lines → end.
    - name: Enforce baseline — enter configure mode
      ansible.netcommon.cli_command:
        command: configure terminal

    - name: Enforce baseline — push config lines
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      loop: >-
        {{ lookup('file', config_file).splitlines()
           | reject('match', '^!')
           | reject('match', '^\s*$')
           | list }}
      register: enforce_result

    - name: Enforce baseline — exit configure mode
      ansible.netcommon.cli_command:
        command: end
      notify: Save startup config

    - name: Report enforcement result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} — config pushed (EOS 4.12: no delta tracking)"

  handlers:
    - name: Save startup config
      ansible.netcommon.cli_command:
        command: copy running-config startup-config
        prompt: '\[startup-config\]'
        answer: ''

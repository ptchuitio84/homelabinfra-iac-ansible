# =============================================================================
# playbooks/network/arista_push.yml — Push Configuration to Arista Switches
# =============================================================================
# PURPOSE:
# Applies EOS baseline config files to all Arista switches via eAPI.
# This is ADDITIVE — only lines that differ from the running config are pushed.
# Saves to startup-config if any changes are made.
#
# CONFIG FILE SOURCE:
# Each switch resolves its own config file path from host_vars:
#   swplnet252 → network/arista_7050sx_swplnet252.eos  (host_vars/swplnet252.nnt.com/vars.yml)
#   swplnet253 → network/arista_7048t_swplnet253.eos   (host_vars/swplnet253.nnt.com/vars.yml)
#
# USAGE:
#   # Push to all Arista switches:
#   ansible-playbook playbooks/network/arista_push.yml --vault-password-file ~/.vault_pass
#
#   # Push to one switch only:
#   ansible-playbook playbooks/network/arista_push.yml --limit swplnet252.nnt.com \
#     --vault-password-file ~/.vault_pass
#
# VAULT REQUIRED: yes — credentials in group_vars/arista_switches/vault.yml
# =============================================================================

---
- name: Push Arista EOS baseline configs
  hosts: arista_switches
  gather_facts: false

  vars:
    backup_dir: "{{ playbook_dir }}/../../network/backups"

  tasks:

    - name: Resolve config file path for this host
      ansible.builtin.set_fact:
        config_file: "{{ playbook_dir }}/../../{{ hostvars[inventory_hostname].config_file }}"

    - name: Verify config file exists on control node
      ansible.builtin.stat:
        path: "{{ config_file }}"
      register: config_stat
      delegate_to: localhost

    - name: Abort if config file is missing
      ansible.builtin.fail:
        msg: "Config file not found: {{ config_file }} — aborting push."
      when: not config_stat.stat.exists

    - name: Capture running config before making changes
      arista.eos.eos_command:
        commands: show running-config
      register: pre_backup

    - name: Save pre-push backup to disk
      ansible.builtin.copy:
        content: "{{ pre_backup.stdout[0] }}"
        dest: "{{ backup_dir }}/{{ inventory_hostname }}_pre-push_{{ lookup('pipe', 'date +%Y-%m-%d_%H%M') }}.txt"
      delegate_to: localhost

    - name: Push baseline config to switch
      arista.eos.eos_config:
        src: "{{ config_file }}"
      notify: Save startup config

  handlers:
    - name: Save startup config
      arista.eos.eos_command:
        commands:
          - command: copy running-config startup-config
            prompt: '\[startup-config\]'
            answer: ''

# =============================================================================
# playbooks/network/vlan_audit.yml — Verify VLAN Consistency Across All Switches
# =============================================================================
# PURPOSE:
# Confirms that every switch has exactly the right VLANs configured.
# Each switch carries the common set plus its own isolated gateway VLAN —
# no switch should have another switch's isolated VLAN.
#
# VLAN DESIGN:
#   Common (all 3 switches): 2,3,5,6,7,9,10,11,12,14,17,100,105,200,254
#   swplnet251 (Cisco 3750G)    only: VLAN 501 (GWISOLNET1)
#   swplnet252 (Arista 7050SX)  only: VLAN 502 (GWISOLNET2)
#   swplnet253 (Arista 7048T-A) only: VLAN 503 (GWISOLNET3)
#   VLAN 504 must not exist anywhere.
#
# WHAT IT CHECKS:
#   1. All common VLANs are present on every switch
#   2. Each switch has its own isolated gateway VLAN
#   3. No switch has another switch's isolated VLAN (cross-contamination check)
#   4. VLAN 504 does not exist anywhere
#
# This playbook is READ-ONLY — it makes no changes to any device.
#
# USAGE:
#   ansible-playbook playbooks/network/vlan_audit.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt
#
# VAULT REQUIRED: yes
# =============================================================================

---
# ── CISCO — swplnet251 ────────────────────────────────────────────────────────
- name: VLAN Audit — Cisco swplnet251
  hosts: cisco_switches
  gather_facts: false

  vars:
    common_vlans:
      - { id: 2,   name: OOBNET }
      - { id: 3,   name: GUESTNET }
      - { id: 5,   name: HOMENET }
      - { id: 6,   name: HOUSEHOLDNET }
      - { id: 7,   name: TVNET }
      - { id: 9,   name: PRINTNET }
      - { id: 10,  name: INFRACORENET }
      - { id: 11,  name: SANISCSINET }
      - { id: 12,  name: STORVMNET }
      - { id: 14,  name: SECCAMNET }
      - { id: 17,  name: TESTNET }
      - { id: 100, name: COREMGMTNET }
      - { id: 105, name: CONFMGMTNET }
      - { id: 200, name: NANONET }
      - { id: 254, name: PLATFORMNET }
      - { id: 501, name: GWISOLNET1 }    # Cisco-only isolated Meraki uplink VLAN

    # VLANs that must NOT exist on this switch.
    # 502/503 belong to the Arista switches. 504 is decommissioned everywhere.
    banned_vlans: [502, 503, 504]

  tasks:
    - name: Retrieve VLAN table
      cisco.ios.ios_command:
        commands: show vlan brief
      register: vlan_output

    - name: Verify all expected VLANs are present
      ansible.builtin.assert:
        that: "vlan_output.stdout[0] is search(item.id | string)"
        fail_msg: "MISSING: VLAN {{ item.id }} ({{ item.name }}) not found on {{ inventory_hostname }}"
        success_msg: "OK: VLAN {{ item.id }} ({{ item.name }}) present"
      loop: "{{ common_vlans }}"

    - name: Verify banned VLANs are absent
      ansible.builtin.assert:
        that: "vlan_output.stdout[0] is not search('^' + item | string + ' ')"
        fail_msg: "VIOLATION: VLAN {{ item }} must not exist on {{ inventory_hostname }}"
        success_msg: "OK: VLAN {{ item }} correctly absent"
      loop: "{{ banned_vlans }}"

    - name: Display full VLAN table
      ansible.builtin.debug:
        msg: "{{ vlan_output.stdout[0] }}"


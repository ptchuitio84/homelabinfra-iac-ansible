# =============================================================================
# playbooks/monitoring/deploy_promtail.yml — Deploy Promtail (log shipper)
# =============================================================================
# Deploys Promtail to all Linux hosts. Promtail tails logs and ships them
# to Loki on hmvlapmon003:3100.
#
# Run after Loki is deployed and healthy.
#
# USAGE:
#   ansible-playbook playbooks/monitoring/deploy_promtail.yml
#   ansible-playbook playbooks/monitoring/deploy_promtail.yml --limit hmpplxap002.nnt.com
# =============================================================================

---
- name: Deploy Promtail (all Linux hosts)
  hosts: linux
  become: true
  gather_facts: true

  roles:
    - promtail

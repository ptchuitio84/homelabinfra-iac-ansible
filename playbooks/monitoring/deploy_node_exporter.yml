# =============================================================================
# playbooks/monitoring/deploy_node_exporter.yml — Deploy Prometheus node_exporter
# =============================================================================
# Deploys node_exporter to all Linux hosts so Prometheus can scrape host metrics.
#
# TARGETS:
#   hmvlapans001 — Ansible control node
#   hmvlapjkn001 — Jenkins
#   hmvlapmon001-003 — Monitoring stack
#   hmpplxap002  — Plex Media Server
#
# USAGE:
#   ansible-playbook playbooks/monitoring/deploy_node_exporter.yml
#   ansible-playbook playbooks/monitoring/deploy_node_exporter.yml --limit hmpplxap002.nnt.com
# =============================================================================

---
- name: Deploy node_exporter (all Linux hosts)
  hosts:
    - ansible_nodes
    - jenkins
    - monitoring
    - plex_servers
  become: true
  gather_facts: true

  roles:
    - node_exporter

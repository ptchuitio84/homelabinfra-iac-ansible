# =============================================================================
# playbooks/linux/setup_login_banner.yml — Deploy Login Banner
# =============================================================================
# Applies the login_banner role to all managed Linux VMs.
# Skips unreachable or failing hosts and continues to the next.
#
# EXCLUDED (intentional — not Linux VMs):
#   Windows hosts    — no /etc, no profile.d
#   vCenter (vc001)  — VCSA appliance, read-only /etc
#   Network gear     — Cisco/Arista/Meraki, not Linux
#   mailcleaner01    — Python 2.6, excluded from management
#   ESXi hosts       — managed separately
#
# USAGE:
#   ./scripts/deploy-banner.sh                              # all Linux VMs
#   ./scripts/deploy-banner.sh --limit hmvlapmon002.nnt.com # single host
# =============================================================================

---
- name: Deploy login banner to all Linux VMs
  hosts: >-
    ansible_nodes:
    monitoring:
    jenkins:
    nfs_servers:
    registry:
    vault_servers:
    k8s_nodes:
    netbox:
    plex_servers
  gather_facts: true
  ignore_unreachable: true
  any_errors_fatal: false
  vars:
    banner_role: "{{ vm_role | default('') }}"

  roles:
    - login_banner

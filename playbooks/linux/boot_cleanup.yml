# =============================================================================
# playbooks/linux/boot_cleanup.yml — /boot Cleanup + Disk Expansion
# =============================================================================
# Removes old kernels to reclaim /boot space, then expands the root LVM
# volume to use any new disk space provisioned at the hypervisor level.
#
# TARGETS: All OL9+ Linux VMs (plex_servers excluded — OL7, different layout)
#
# SAFE TO RUN REPEATEDLY — growpart is idempotent, lvextend skips if no
# free space, xfs_growfs is always safe on a mounted filesystem.
#
# USAGE (manual):
#   ansible-playbook playbooks/linux/boot_cleanup.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt
#
# USAGE (via Jenkins):
#   nnt-jkn-boot-cleanup pipeline
# =============================================================================

---
- name: Clean /boot and expand root disk
  hosts: linux:!plex_servers:!ansible_nodes:!netbox
  gather_facts: true
  serial: 5

  tasks:

    # -------------------------------------------------------------------------
    # Guard — skip anything not OL9+
    # -------------------------------------------------------------------------
    - name: Skip non-OL9 hosts
      ansible.builtin.meta: end_host
      when: ansible_distribution_major_version | int < 9

    # -------------------------------------------------------------------------
    # 1. Kernel cleanup
    # -------------------------------------------------------------------------
    - name: Remove old kernels (keep 2)
      ansible.builtin.command:
        cmd: dnf remove --oldinstallonly --setopt installonly_limit=2 -y
      register: kernel_cleanup
      changed_when: "'Removed' in kernel_cleanup.stdout"

    - name: Report /boot usage after cleanup
      ansible.builtin.command: df -h /boot
      register: boot_df
      changed_when: false

    - name: Show /boot usage
      ansible.builtin.debug:
        msg: "{{ boot_df.stdout_lines }}"

    # -------------------------------------------------------------------------
    # 2. Detect OS disk (disk containing /boot partition)
    # -------------------------------------------------------------------------
    - name: Detect OS disk device
      ansible.builtin.shell: |
        lsblk -no PKNAME $(findmnt -n -o SOURCE /boot) | head -1
      register: os_disk_raw
      changed_when: false

    - name: Set OS disk fact
      ansible.builtin.set_fact:
        os_disk: "{{ os_disk_raw.stdout | trim }}"

    # -------------------------------------------------------------------------
    # 3. Rescan disk so OS sees hypervisor-level expansion
    # -------------------------------------------------------------------------
    - name: Rescan OS disk
      ansible.builtin.shell: echo 1 > /sys/class/block/{{ os_disk }}/device/rescan
      changed_when: false

    # -------------------------------------------------------------------------
    # 4. Install growpart
    # -------------------------------------------------------------------------
    - name: Install cloud-utils-growpart
      ansible.builtin.dnf:
        name: cloud-utils-growpart
        state: present

    # -------------------------------------------------------------------------
    # 5. Detect LVM PV on OS disk + expand it
    # -------------------------------------------------------------------------
    - name: Detect LVM PV partition on OS disk
      ansible.builtin.shell: |
        pvs --noheadings -o pv_name 2>/dev/null | tr -d ' ' | grep "^/dev/{{ os_disk }}" | head -1
      register: lvm_pv_raw
      changed_when: false

    - name: Set LVM PV facts
      ansible.builtin.set_fact:
        lvm_pv: "{{ lvm_pv_raw.stdout | trim }}"
        lvm_partnum: "{{ lvm_pv_raw.stdout | trim | regex_replace('^/dev/' + os_disk, '') }}"

    - name: Grow LVM PV partition
      ansible.builtin.command: growpart /dev/{{ os_disk }} {{ lvm_partnum }}
      register: growpart_result
      changed_when: growpart_result.rc == 0 and 'NOCHANGE' not in growpart_result.stdout
      failed_when: growpart_result.rc not in [0, 1] or
                   (growpart_result.rc == 1 and 'NOCHANGE' not in growpart_result.stdout and
                    'it cannot be grown' not in growpart_result.stderr)

    # -------------------------------------------------------------------------
    # 6. Resize LVM PV + extend root LV
    # -------------------------------------------------------------------------
    - name: Resize LVM physical volume
      ansible.builtin.command: pvresize {{ lvm_pv }}
      register: pvresize_result
      changed_when: "'changed' in pvresize_result.stdout or '1 changed' in pvresize_result.stdout"

    - name: Extend root logical volume
      ansible.builtin.command: lvextend -l +100%FREE /dev/ol/root
      register: lvextend_result
      changed_when: "'size of logical volume' in lvextend_result.stdout"
      failed_when: lvextend_result.rc != 0 and
                   'matches existing size' not in lvextend_result.stdout and
                   'already' not in lvextend_result.stderr

    # -------------------------------------------------------------------------
    # 7. Grow XFS filesystem
    # -------------------------------------------------------------------------
    - name: Grow root XFS filesystem
      ansible.builtin.command: xfs_growfs /
      register: xfs_result
      changed_when: "'data blocks changed' in xfs_result.stdout"

    # -------------------------------------------------------------------------
    # 8. Final report
    # -------------------------------------------------------------------------
    - name: Report final disk state
      ansible.builtin.command: df -h / /boot
      register: final_df
      changed_when: false

    - name: Show final disk state
      ansible.builtin.debug:
        msg: "{{ final_df.stdout_lines }}"

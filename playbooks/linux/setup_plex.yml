# =============================================================================
# playbooks/linux/setup_plex.yml — Deploy Plex Media Server
# =============================================================================
# Deploys and configures Plex Media Server on hmpplxap002 (OL7.9, R510).
#
# PREREQUISITES (fresh build only — skip if server already running):
#   1. Configure network bond:
#      ansible-playbook playbooks/linux/configure_plex_bond.yml \
#        --vault-password-file ~/.ansible/vault_pass.txt
#
#   2. Provision LVM volumes (/plx and /data):
#      ansible-playbook playbooks/infra/lvm_provision_plex.yml \
#        --vault-password-file ~/.ansible/vault_pass.txt
#
#   3. Get a fresh Plex claim token at https://www.plex.tv/claim/
#      Update vault_plex_claim_token in group_vars/plex_servers/vault.yml
#
# USAGE:
#   ansible-playbook playbooks/linux/setup_plex.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt
#
# VAULT REQUIRED: yes
# =============================================================================

---
- name: Deploy Plex Media Server — hmpplxap002
  hosts: plex_servers
  become: true
  gather_facts: false

  pre_tasks:
    # OL7 ships Python 3.6 only. ansible-core 2.16 requires Python 3.7+ on the target.
    # Add Oracle SCL repo and install rh-python38 before anything else.
    # raw uses SSH directly — no Python needed — so this runs first.
    - name: Ensure Python 3.8 is installed (OL7 bootstrap — ansible-core 2.16 requires 3.7+)
      ansible.builtin.raw: |
        cat > /etc/yum.repos.d/ol7_scl.repo << 'EOF'
        [ol7_software_collections]
        name=Software Collection packages for Oracle Linux 7
        baseurl=https://yum.oracle.com/repo/OracleLinux/OL7/SoftwareCollections/x86_64/
        gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-oracle
        gpgcheck=1
        enabled=1
        EOF
        yum install -y rh-python38
      changed_when: false
      check_mode: false    # Must run even in --check — nothing else works without it

    - name: Gather facts (Python 3 now available)
      ansible.builtin.setup:

  roles:
    - common
    - plex

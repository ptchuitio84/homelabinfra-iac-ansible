---
# =============================================================================
# playbooks/linux/update_plex.yml
# =============================================================================
# Upgrade Plex Media Server to a specific version on HMPPLXAP002.
#
# REQUIRED VARS (pass via -e):
#   plex_version  — full version string including build hash
#                   e.g. 1.43.1.10611-abc123de
#
# TARGET:
#   Pass via -l on the ansible-playbook command line (plex_servers)
#
# USAGE:
#   ansible-playbook playbooks/linux/update_plex.yml \
#     -i inventory/ \
#     -l plex_servers \
#     -e plex_version=1.43.1.10611-abc123de
#
# DOWNLOAD URL PATTERN:
#   https://downloads.plex.tv/plex-media-server-new/<version>/redhat/plexmediaserver-<version>.x86_64.rpm
# =============================================================================

- name: Upgrade Plex Media Server
  hosts: all
  become: true
  gather_facts: false

  vars:
    plex_rpm_url: "https://downloads.plex.tv/plex-media-server-new/{{ plex_version }}/redhat/plexmediaserver-{{ plex_version }}.x86_64.rpm"
    plex_rpm_dest: "/tmp/plexmediaserver-{{ plex_version }}.x86_64.rpm"

  pre_tasks:
    - name: Assert plex_version is defined
      ansible.builtin.assert:
        that: plex_version is defined and plex_version | length > 0
        fail_msg: "plex_version must be passed via -e plex_version=<version-buildhash>"

    - name: Check currently installed version
      ansible.builtin.shell: rpm -q plexmediaserver --queryformat '%{VERSION}-%{RELEASE}' 2>/dev/null || echo "not-installed"
      register: current_version
      changed_when: false

    - name: Report current version
      ansible.builtin.debug:
        msg: "Current: {{ current_version.stdout }} → Target: {{ plex_version }}"

  tasks:
    - name: Download Plex RPM {{ plex_version }}
      ansible.builtin.get_url:
        url: "{{ plex_rpm_url }}"
        dest: "{{ plex_rpm_dest }}"
        mode: '0644'
        timeout: 120

    - name: Stop plexmediaserver
      ansible.builtin.systemd:
        name: plexmediaserver
        state: stopped

    - name: Install Plex RPM {{ plex_version }}
      ansible.builtin.shell: yum localinstall -y {{ plex_rpm_dest }}
      register: yum_result

    - name: Start plexmediaserver
      ansible.builtin.systemd:
        name: plexmediaserver
        state: started

    - name: Pause for service to stabilise
      ansible.builtin.pause:
        seconds: 5

    - name: Verify plexmediaserver is active
      ansible.builtin.systemd:
        name: plexmediaserver
      register: svc_status
      failed_when: svc_status.status.ActiveState != 'active'

    - name: Verify installed version
      ansible.builtin.shell: rpm -q plexmediaserver --queryformat '%{VERSION}-%{RELEASE}'
      register: installed_version
      changed_when: false

    - name: Assert version matches target
      ansible.builtin.assert:
        that: plex_version in installed_version.stdout
        fail_msg: "Version mismatch — expected {{ plex_version }}, got {{ installed_version.stdout }}"

    - name: Clean up RPM
      ansible.builtin.file:
        path: "{{ plex_rpm_dest }}"
        state: absent

    - name: Report final status
      ansible.builtin.debug:
        msg: >-
          plexmediaserver upgraded to {{ installed_version.stdout }} —
          {{ svc_status.status.ActiveState }} ({{ svc_status.status.SubState }})
          started {{ svc_status.status.ExecMainStartTimestamp }}

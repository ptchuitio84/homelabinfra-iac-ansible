---
# =============================================================================
# playbooks/linux/update_plex.yml
# =============================================================================
# Upgrade Plex Media Server to a specific version on HMPPLXAP002.
#
# REQUIRED VARS (pass via -e):
#   plex_version  — full version string including build hash
#                   e.g. 1.43.1.10611-1e34174b1
#
# TARGET:
#   Pass via -l on the ansible-playbook command line (plex_servers)
#
# USAGE:
#   ansible-playbook playbooks/linux/update_plex.yml \
#     -i inventory/ \
#     -l plex_servers \
#     -e plex_version=1.43.1.10611-1e34174b1
# =============================================================================

- name: Upgrade Plex Media Server
  hosts: all
  become: true
  gather_facts: false

  vars:
    plex_rpm_url: "https://downloads.plex.tv/plex-media-server-new/{{ plex_version }}/redhat/plexmediaserver-{{ plex_version }}.x86_64.rpm"
    plex_rpm_dest: "/tmp/plexmediaserver-{{ plex_version }}.x86_64.rpm"

  pre_tasks:
    - name: Assert plex_version is defined and includes build hash
      ansible.builtin.assert:
        that:
          - plex_version is defined
          - plex_version | length > 0
          - "'-' in plex_version"
        fail_msg: "plex_version must include the build hash — e.g. 1.43.1.10611-1e34174b1"

    - name: Remove duplicate Plex repo file if present
      ansible.builtin.file:
        path: /etc/yum.repos.d/PlexRepo.repo
        state: absent

    - name: Check currently installed version
      ansible.builtin.shell: rpm -q plexmediaserver --queryformat '%{VERSION}-%{RELEASE}' 2>/dev/null || echo "not-installed"
      register: current_version
      changed_when: false

    - name: Report current → target
      ansible.builtin.debug:
        msg: "Current: {{ current_version.stdout }} → Target: {{ plex_version }}"

  tasks:
    - name: Upgrade block
      block:
        - name: Import Plex GPG signing key
          ansible.builtin.rpm_key:
            key: https://downloads.plex.tv/plex-keys/PlexSign.v2.key
            state: present

        - name: Download Plex RPM {{ plex_version }}
          ansible.builtin.get_url:
            url: "{{ plex_rpm_url }}"
            dest: "{{ plex_rpm_dest }}"
            mode: '0644'
            timeout: 120

        - name: Stop plexmediaserver
          ansible.builtin.systemd:
            name: plexmediaserver
            state: stopped

        - name: Install Plex RPM {{ plex_version }}
          ansible.builtin.shell: rpm -Uvh {{ plex_rpm_dest }}

        - name: Start plexmediaserver
          ansible.builtin.systemd:
            name: plexmediaserver
            state: started

        - name: Pause for service to stabilise
          ansible.builtin.pause:
            seconds: 5

        - name: Verify plexmediaserver is active
          ansible.builtin.systemd:
            name: plexmediaserver
          register: svc_status
          failed_when: svc_status.status.ActiveState != 'active'

        - name: Check installed version
          ansible.builtin.shell: rpm -q plexmediaserver --queryformat '%{VERSION}-%{RELEASE}'
          register: new_version
          changed_when: false

        - name: Clean up RPM
          ansible.builtin.file:
            path: "{{ plex_rpm_dest }}"
            state: absent

        - name: Report upgrade result
          ansible.builtin.debug:
            msg: >-
              plexmediaserver: {{ current_version.stdout }} → {{ new_version.stdout }} —
              {{ svc_status.status.ActiveState }} ({{ svc_status.status.SubState }})
              started {{ svc_status.status.ExecMainStartTimestamp }}

      rescue:
        - name: Ensure plexmediaserver is started after failed upgrade
          ansible.builtin.systemd:
            name: plexmediaserver
            state: started
          ignore_errors: true

        - name: Report failure
          ansible.builtin.fail:
            msg: "Upgrade failed. plexmediaserver has been restarted on the previous version. Check the error above."

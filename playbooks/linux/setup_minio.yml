# =============================================================================
# playbooks/linux/setup_minio.yml — Minio Object Storage
# =============================================================================
# Deploys single-node Minio on OL9. Pulls root credentials from HashiCorp
# Vault at runtime — Vault must be unsealed before running.
#
# PRE-FLIGHT (do these before running):
#   1. On hmvlapvlt001 — create the secret:
#        export VAULT_ADDR=http://10.10.0.44:8200
#        vault kv put secret/minio/root user=minio password='<strong-pass>'
#   2. Populate vault_lookup_token in:
#        inventory/group_vars/minio_servers/vault.yml
#      then encrypt:
#        ansible-vault encrypt inventory/group_vars/minio_servers/vault.yml
#   3. On ans001 — install new collection:
#        ansible-galaxy collection install -r requirements.yml
#
# USAGE (manual):
#   ansible-playbook playbooks/linux/setup_minio.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt \
#     --limit hmvlapmin001
#
# USAGE (via Jenkins pipeline):
#   Triggered automatically by nnt-jkn-provision-vm with role=minio
# =============================================================================

---
- name: Deploy Minio object storage
  hosts: all
  gather_facts: true

  vars:
    vault_addr: "http://10.10.0.44:8200"

  vars_files:
    - ../../inventory/group_vars/minio_servers/vault.yml

  pre_tasks:
    - name: Verify Vault is reachable
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/health"
        validate_certs: false
        status_code: [200, 429, 472, 473, 501, 503]
      delegate_to: localhost
      register: vault_health
      failed_when: vault_health.status not in [200, 429, 472, 473, 501, 503]

    - name: Confirm Vault is unsealed
      ansible.builtin.assert:
        that: not vault_health.json.sealed
        fail_msg: "Vault at {{ vault_addr }} is sealed — unseal it before running this playbook"

    - name: Fetch Minio credentials from Vault
      ansible.builtin.set_fact:
        minio_root_user: "{{ vault_creds.secret.user }}"
        minio_root_password: "{{ vault_creds.secret.password }}"
      vars:
        vault_creds: "{{ lookup('community.hashi_vault.vault_kv2_get', 'minio/root',
          engine_mount_point='secret',
          token=vault_lookup_token,
          url=vault_addr) }}"
      no_log: true

  roles:
    - minio

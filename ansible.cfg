# =============================================================================
# ansible.cfg — Ansible Global Configuration
# =============================================================================
# This file controls how Ansible behaves across every playbook in this repo.
# It lives at the root of the repo so it is automatically picked up when you
# run any "ansible-playbook" command from this directory.
#
# Think of this as the "settings" file for the entire automation engine.
# =============================================================================

[defaults]

# Where Ansible looks for the list of hosts (inventory).
# Pointing to a directory tells Ansible to merge ALL .yml files inside it,
# including subdirectories (network/, compute/, linux/).
inventory           = inventory/

# Where Ansible looks for reusable task bundles (roles).
roles_path          = roles

# Where Ansible collections (vendor modules like cisco.ios, arista.eos) are stored.
collections_path    = ~/.ansible/collections

# Do not fail if a host's SSH fingerprint is not in known_hosts.
# Acceptable for a private home lab — would be stricter in production.
host_key_checking   = False

# Do not create .retry files when a playbook fails partway through.
retry_files_enabled = False

# Output format — "yaml" is easier to read than the default one-line format.
stdout_callback     = yaml

# "smart" gathering means Ansible only collects host facts once per run
# and caches them, avoiding redundant SSH calls on large inventories.
gathering           = smart

# Cache collected host facts to disk so they survive between playbook runs.
# Useful when running multiple playbooks back-to-back.
fact_caching        = jsonfile
fact_caching_connection = /tmp/ansible_facts

# How long (in seconds) to keep cached facts before refreshing. 86400 = 24h.
fact_caching_timeout = 86400

# Vault password file — stores the password used to decrypt ansible-vault secrets.
# This file must exist on the machine running the playbook (control node or your Mac).
# It is NOT committed to git. Create it manually after cloning:
#   echo 'your_vault_password' > ~/.ansible/vault_pass.txt
#   chmod 600 ~/.ansible/vault_pass.txt
# Then uncomment the line below:
# vault_password_file = ~/.ansible/vault_pass.txt

[ssh_connection]

# Pipelining reduces the number of SSH connections needed per task.
# Results in significantly faster playbook runs — especially over slow links.
pipelining = True

# SSH connection reuse settings:
#   ControlMaster=auto    — reuse an existing SSH connection if one exists
#   ControlPersist=60s    — keep the connection open for 60s after last use
#   StrictHostKeyChecking=no — do not prompt for unknown host keys (lab only)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

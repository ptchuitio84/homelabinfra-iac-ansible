# =============================================================================
# roles/dcatlas_smoke/tasks/main.yml — dcAtlas Smoke Test Stack
# =============================================================================

---
# ---------------------------------------------------------------------------
# 1. Clone repo
# ---------------------------------------------------------------------------
- name: Create dcAtlas working directory
  ansible.builtin.file:
    path: "{{ dcatlas_dir }}"
    state: directory
    mode: '0755'

- name: Clone dcAtlas repository
  ansible.builtin.git:
    repo: "https://{{ dcatlas_github_user }}:{{ github_pat }}@github.com/{{ dcatlas_github_user }}/{{ dcatlas_repo_name }}.git"
    dest: "{{ dcatlas_dir }}"
    version: "{{ dcatlas_branch }}"
    force: false
  no_log: true

# ---------------------------------------------------------------------------
# 2. Deploy .env with the public API URL, then build and start stack
# ---------------------------------------------------------------------------
- name: Deploy .env with public API URL
  ansible.builtin.copy:
    dest: "{{ dcatlas_dir }}/.env"
    content: |
      NEXT_PUBLIC_API_URL={{ dcatlas_public_api_url }}
    owner: root
    group: root
    mode: '0644'

- name: Build and start docker compose stack
  ansible.builtin.command:
    cmd: docker compose up -d --build
    chdir: "{{ dcatlas_dir }}"
  changed_when: true
  async: 600
  poll: 30

# ---------------------------------------------------------------------------
# 3. Wait for backend readiness
# ---------------------------------------------------------------------------
- name: Wait for backend health endpoint
  ansible.builtin.uri:
    url: http://localhost:8000/health
    status_code: 200
  register: health_check
  retries: 60
  delay: 10
  until: health_check.status == 200

# ---------------------------------------------------------------------------
# 4. Seed demo data
# ---------------------------------------------------------------------------
- name: Run demo data seeder
  ansible.builtin.command:
    cmd: python3 backend/scripts/seed_demo.py --base-url http://localhost:8000/api/v1 --verbose
    chdir: "{{ dcatlas_dir }}"
  register: seeder_result
  changed_when: true

- name: Show seeder output
  ansible.builtin.debug:
    msg: "{{ seeder_result.stdout_lines }}"

# ---------------------------------------------------------------------------
# 5. Final validation
# ---------------------------------------------------------------------------
- name: Validate demands endpoint returns seeded data
  ansible.builtin.uri:
    url: http://localhost:8000/api/v1/demands
    status_code: 200
  register: demands_check

- name: Confirm stack is live
  ansible.builtin.debug:
    msg:
      - "dcAtlas stack is live at http://{{ ansible_host }}:3000"
      - "API: http://{{ ansible_host }}:8000/api/v1/demands"
      - "Demands returned: {{ demands_check.json | length }}"

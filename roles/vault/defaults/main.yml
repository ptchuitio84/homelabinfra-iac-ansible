# =============================================================================
# roles/vault/defaults/main.yml — HashiCorp Vault Defaults
# =============================================================================
# Deploys Vault with file storage backend and HTTP listener.
# Vault starts sealed — run 'vault operator init' after deploy to initialize.
#
# TLS NOTE: HTTP only for initial bootstrap. Enable TLS after cert-manager
# is deployed on k8s and a proper cert is available.
# =============================================================================

---
vault_version:      "1.18.3"
vault_data_dir:     /opt/vault/data
vault_config_dir:   /etc/vault.d
vault_listen_addr:  "0.0.0.0"
vault_port:         8200
vault_ui:           true

vault_tls_enabled:   false
vault_tls_dir:       /etc/vault.d/tls
vault_tls_cert_file: /etc/vault.d/tls/vault.crt
vault_tls_key_file:  /etc/vault.d/tls/vault.key

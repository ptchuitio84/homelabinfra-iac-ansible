# =============================================================================
# roles/k3s/tasks/control_plane.yml — k3s Server Install
# =============================================================================

- name: Create k3s config directory
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install k3s server
  ansible.builtin.shell:
    cmd: >
      curl -sfL https://get.k3s.io |
      INSTALL_K3S_VERSION={{ k3s_version }}
      sh -s - server
      --disable traefik
      --write-kubeconfig-mode 644
      --node-ip {{ ansible_default_ipv4.address }}
    creates: /usr/local/bin/k3s

- name: Enable and start k3s
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for node token to exist
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120

- name: Read node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Set token fact
  ansible.builtin.set_fact:
    k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: Wait for API server to be ready
  ansible.builtin.command:
    cmd: k3s kubectl get nodes
  register: kubectl_result
  until: kubectl_result.rc == 0
  retries: 20
  delay: 10
  changed_when: false

- name: Open k3s API port
  ansible.posix.firewalld:
    port: "{{ k3s_api_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Open flannel VXLAN port
  ansible.posix.firewalld:
    port: "8472/udp"
    permanent: true
    state: enabled
    immediate: true

- name: Open kubelet port
  ansible.posix.firewalld:
    port: "10250/tcp"
    permanent: true
    state: enabled
    immediate: true

# =============================================================================
# roles/unpoller/tasks/main.yml — UnPoller Deployment Tasks
# =============================================================================

---
- name: Create unpoller system group
  ansible.builtin.group:
    name: "{{ unpoller_group }}"
    system: true
    state: present

- name: Create unpoller system user
  ansible.builtin.user:
    name: "{{ unpoller_user }}"
    group: "{{ unpoller_group }}"
    system: true
    shell: /sbin/nologin
    home: "{{ unpoller_install_dir }}"
    create_home: false
    state: present

- name: Create install and log directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ unpoller_user }}"
    group: "{{ unpoller_group }}"
    mode: '0755'
  loop:
    - "{{ unpoller_install_dir }}"
    - "{{ unpoller_config_dir }}"
    - "{{ unpoller_log_dir }}"

- name: Download UnPoller {{ unpoller_version }}
  ansible.builtin.get_url:
    url: "https://github.com/unpoller/unpoller/releases/download/v{{ unpoller_version }}/unpoller_{{ unpoller_version }}_linux_amd64.tar.gz"
    dest: "/tmp/unpoller_{{ unpoller_version }}.tar.gz"
    mode: '0644'

- name: Extract UnPoller archive
  ansible.builtin.unarchive:
    src: "/tmp/unpoller_{{ unpoller_version }}.tar.gz"
    dest: /tmp/
    remote_src: true

- name: Install UnPoller binary
  ansible.builtin.copy:
    src: "/tmp/unpoller"
    dest: "{{ unpoller_install_dir }}/unpoller"
    owner: "{{ unpoller_user }}"
    group: "{{ unpoller_group }}"
    mode: '0755'
    remote_src: true
  notify: Restart unpoller

- name: Deploy UnPoller configuration
  ansible.builtin.template:
    src: up.conf.j2
    dest: "{{ unpoller_config_file }}"
    owner: "{{ unpoller_user }}"
    group: "{{ unpoller_group }}"
    mode: '0640'
  notify: Restart unpoller

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: unpoller.service.j2
    dest: /etc/systemd/system/unpoller.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd and restart unpoller

- name: Open firewall port for unpoller
  ansible.posix.firewalld:
    port: "{{ unpoller_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Enable and start unpoller service
  ansible.builtin.systemd:
    name: unpoller
    enabled: true
    state: started
    daemon_reload: true

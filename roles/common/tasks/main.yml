---
- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Install base packages
  ansible.builtin.dnf:
    name: "{{ base_packages }}"
    state: present

- name: Configure NTP (chrony)
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart chrony

- name: Enable and start chronyd
  ansible.builtin.systemd:
    name: chronyd
    enabled: true
    state: started

- name: Disable firewalld (internal VMs — network layer handles security)
  ansible.builtin.systemd:
    name: firewalld
    enabled: false
    state: stopped
  ignore_errors: true

- name: Set SELinux to permissive
  ansible.posix.selinux:
    policy: targeted
    state: permissive

- name: Ensure /etc/hosts has correct loopback
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.0\.1'
    line: '127.0.0.1   localhost localhost.localdomain'

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

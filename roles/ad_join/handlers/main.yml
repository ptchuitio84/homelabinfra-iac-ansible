---
- name: Restart sssd
  ansible.builtin.systemd:
    name: sssd
    state: restarted

- name: Restart oddjobd
  ansible.builtin.systemd:
    name: oddjobd
    state: restarted

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

# =============================================================================
# roles/node_exporter/tasks/main.yml — node_exporter Deployment Tasks
# =============================================================================
# Deploys Prometheus node_exporter on OL9 as a systemd service.
# Run via: ansible-playbook playbooks/deploy_node_exporter.yml
#
# These tasks are idempotent — safe to re-run without side effects.
# =============================================================================

---
# =============================================================================
# SECTION 1: SYSTEM USER
# =============================================================================

- name: Create node_exporter system group
  ansible.builtin.group:
    name: "{{ node_exporter_group }}"
    system: true
    state: present

- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    system: true
    shell: /sbin/nologin
    create_home: false
    state: present

# =============================================================================
# SECTION 2: INSTALL
# =============================================================================

- name: Download node_exporter {{ node_exporter_version }}
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: '0644'

- name: Extract node_exporter archive
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp/
    remote_src: true

- name: Create node_exporter install directory
  ansible.builtin.file:
    path: "{{ node_exporter_install_dir }}"
    state: directory
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    mode: '0755'

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    mode: '0755'
    remote_src: true
  notify: Restart node_exporter

# =============================================================================
# SECTION 3: SYSTEMD SERVICE
# =============================================================================

- name: Deploy node_exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true

# =============================================================================
# SECTION 4: VERIFY
# =============================================================================

- name: Wait for node_exporter to be reachable
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ node_exporter_port }}"
    timeout: 30

- name: Open node_exporter port in firewalld
  ansible.posix.firewalld:
    port: "{{ node_exporter_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Display node_exporter status
  ansible.builtin.debug:
    msg: "node_exporter is up — http://{{ ansible_host }}:{{ node_exporter_port }}/metrics"

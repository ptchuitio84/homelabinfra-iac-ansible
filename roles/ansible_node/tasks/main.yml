# =============================================================================
# roles/ansible_node/tasks/main.yml — Ansible Control Node Setup Tasks
# =============================================================================
# Configures a fresh OL9 VM as the Ansible control node.
# Run via: ansible-playbook playbooks/setup_ansible_node.yml
#
# These tasks are idempotent — safe to re-run without side effects.
# =============================================================================

---
# Install system packages required before Ansible itself can be installed.
#   python3-pip   — pip package manager (needed to install Ansible via pip)
#   python3-devel — Python headers (required to build some pip packages)
#   sshpass       — allows Ansible to pass SSH passwords non-interactively
#                   (used until SSH key auth is in place)
#   git           — needed to clone this repo onto the control node
- name: Install pip and system dependencies
  ansible.builtin.dnf:
    name:
      - python3-pip
      - python3-devel
      - sshpass
      - git
    state: present

# Upgrade pip itself before installing Ansible.
# OL9 ships with an older pip that doesn't index modern package versions.
# This must run before any pip install tasks.
- name: Upgrade pip to latest version
  ansible.builtin.pip:
    name: pip
    executable: pip3
    state: latest

# Install ansible-core via pip.
# NOTE: "ansible" and "ansible-core" are different pip packages:
#   ansible-core — the core engine, version matches 2.x (e.g. 2.16)
#   ansible      — the community bundle, uses a different version scheme (e.g. 9.x for core 2.16)
# We install ansible-core for a lean, version-pinned install.
- name: Install ansible-core via pip
  ansible.builtin.pip:
    name: "ansible-core~={{ ansible_install_version }}"
    executable: pip3
    state: present

# Paramiko is a pure-Python SSH library.
# The cisco.ios and arista.eos collections use it for network device connections
# when operating over SSH (as opposed to eAPI). Required even for Arista eAPI
# hosts as a fallback transport.
- name: Install paramiko (SSH library for network device connections)
  ansible.builtin.pip:
    name: paramiko
    executable: pip3
    state: present

# Create the hidden .ansible directory for root.
# This is where Ansible stores the vault password file and user-level config.
# mode 0700 = only root can read or write this directory.
- name: Create /root/.ansible directory
  ansible.builtin.file:
    path: /root/.ansible
    state: directory
    owner: root
    group: root
    mode: '0700'

# Create the vault password file with a placeholder value.
# IMPORTANT: After provisioning, SSH in and replace the placeholder:
#   echo 'your_actual_vault_password' > /root/.ansible/vault_pass.txt
# "force: false" means Ansible will NOT overwrite this file if it already exists,
# protecting a real password that was set manually.
- name: Create vault password file (set real password manually after provisioning)
  ansible.builtin.copy:
    content: "REPLACE_WITH_VAULT_PASSWORD\n"
    dest: "{{ vault_password_file }}"
    owner: root
    group: root
    mode: '0600'
    force: false

# Write a user-level ansible.cfg for root that points at the vault password file.
# This means you don't need to specify --vault-password-file on every command.
- name: Write /root/.ansible.cfg (points at vault password file)
  ansible.builtin.copy:
    dest: /root/.ansible.cfg
    owner: root
    group: root
    mode: '0644'
    content: |
      [defaults]
      vault_password_file = {{ vault_password_file }}

# Check whether the destination is already a git repo.
# If .git exists, the ansible.builtin.git module will update (pull) in place.
# If it does not exist, the directory was either never cloned or was only partially
# populated by the fallback copy task on a prior run — in that case we remove it
# so git can clone cleanly (git clone creates its own directory).
- name: Check if repo directory is already a git repo
  ansible.builtin.stat:
    path: "{{ repo_dest }}/.git"
  register: git_dir

# Only runs when the directory exists but is NOT a real git repo.
# Removes it so the clone task below gets a clean slate.
- name: Remove non-git repo directory to allow clean clone
  ansible.builtin.file:
    path: "{{ repo_dest }}"
    state: absent
  when: not git_dir.stat.exists

# Clone this repo onto the control node.
# git clone creates the destination directory itself — no need to pre-create it.
# Requires an SSH deploy key to be set up on GitHub and the public key added
# to the control node's root SSH agent or /root/.ssh/.
# "ignore_errors: true" prevents failure on first run before the key is in place.
- name: Clone homelabinfra-iac-ansible repo to {{ repo_dest }}
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ repo_dest }}"
    version: main
    accept_hostkey: true
  ignore_errors: true

# Fallback: ensure the repo directory exists even if the clone failed.
# The copy task below needs the directory to be present.
- name: Create repo directory if clone did not create it
  ansible.builtin.file:
    path: "{{ repo_dest }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

# Fallback: if the clone failed (no SSH key yet), copy requirements.yml manually
# so collection installation can still proceed.
- name: Copy requirements.yml as fallback if clone failed
  ansible.builtin.copy:
    src: requirements.yml
    dest: "{{ repo_dest }}/requirements.yml"
    owner: root
    group: root
    mode: '0644'
  when: not (repo_dest + '/requirements.yml') is file

# Install all Ansible collections listed in requirements.yml.
# This includes cisco.ios, arista.eos, community.vmware, and others.
# "ignore_errors: true" allows the playbook to finish even if a collection
# install fails due to a network issue — can be re-run manually.
- name: Install Ansible collections from requirements.yml
  community.general.ansible_galaxy_install:
    type: collection
    requirements_file: "{{ repo_dest }}/requirements.yml"
  ignore_errors: true

# Sanity check — confirm Ansible is installed and in PATH.
# "changed_when: false" tells Ansible this task never modifies anything,
# so it won't be counted as a change in the play summary.
- name: Verify Ansible installation
  ansible.builtin.command: ansible --version
  register: ansible_version_output
  changed_when: false

# Print the installed version to the Ansible output for confirmation.
- name: Display installed Ansible version
  ansible.builtin.debug:
    msg: "{{ ansible_version_output.stdout_lines[0] }}"

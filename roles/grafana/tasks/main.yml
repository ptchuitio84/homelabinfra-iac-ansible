# =============================================================================
# roles/grafana/tasks/main.yml — Grafana Deployment Tasks
# =============================================================================
# Deploys Grafana on OL9 as a systemd service with Prometheus auto-provisioned
# as a datasource.
# Run via: ansible-playbook playbooks/setup_grafana.yml
#
# These tasks are idempotent — safe to re-run without side effects.
# =============================================================================

---
# =============================================================================
# SECTION 1: DATA DISK
# Auto-detect the 60GB data disk by size — VMware does not guarantee consistent
# sda/sdb assignment across VMs. OS disk is always 30GB, data disk always 60GB.
# Mounts the data disk at /var/lib/grafana so dashboard data lives separate from OS.
# =============================================================================

- name: Detect data disk (disk > 50GB with no partitions)
  ansible.builtin.set_fact:
    _grafana_data_device: "/dev/{{ item.key }}"
  loop: "{{ ansible_devices | dict2items }}"
  when:
    - item.key is match('^sd[a-z]$')
    - (item.value.size | regex_replace(' GB', '') | float) > 50
    - item.value.partitions | length == 0
  loop_control:
    label: "{{ item.key }}"

- name: Fail if no data disk detected
  ansible.builtin.fail:
    msg: "No unpartitioned disk > 50GB found — is the data disk attached and unformatted?"
  when: _grafana_data_device is not defined

- name: Check if {{ _grafana_data_device }} already has a filesystem
  ansible.builtin.command: blkid {{ _grafana_data_device }}
  register: grafana_blkid
  changed_when: false
  failed_when: false

- name: Format {{ _grafana_data_device }} as XFS (only if blank)
  community.general.filesystem:
    fstype: "{{ grafana_data_fstype }}"
    dev: "{{ _grafana_data_device }}"
  when: grafana_blkid.rc != 0

- name: Create Grafana data directory ({{ grafana_data_dir }})
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Check if {{ _grafana_data_device }} is already mounted at {{ grafana_data_dir }}
  ansible.builtin.shell: grep -qs "^{{ _grafana_data_device }} " /proc/mounts
  register: grafana_disk_mounted
  changed_when: false
  failed_when: false

- name: Mount {{ _grafana_data_device }} at {{ grafana_data_dir }}
  ansible.builtin.command: mount {{ _grafana_data_device }} {{ grafana_data_dir }}
  when: grafana_disk_mounted.rc != 0

- name: Ensure {{ _grafana_data_device }} is in fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^{{ _grafana_data_device }}\\s"
    line: "{{ _grafana_data_device }} {{ grafana_data_dir }} {{ grafana_data_fstype }} defaults 0 0"
    state: present

# =============================================================================
# SECTION 2: INSTALL
# Add Grafana OSS repo and install via dnf.
# =============================================================================

- name: Add Grafana OSS repo
  ansible.builtin.yum_repository:
    name: grafana
    description: Grafana OSS
    baseurl: "{{ grafana_repo_baseurl }}"
    repo_gpgcheck: true
    gpgcheck: true
    gpgkey: "{{ grafana_repo_gpgkey }}"
    sslverify: true
    sslcacert: /etc/pki/tls/certs/ca-bundle.crt
    enabled: true

- name: Install Grafana
  ansible.builtin.dnf:
    name: grafana
    state: present

# =============================================================================
# SECTION 3: DIRECTORIES AND PERMISSIONS
# =============================================================================

- name: Create Grafana directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: '0755'
  loop:
    - "{{ grafana_log_dir }}"
    - "{{ grafana_plugins_dir }}"

- name: Set ownership of Grafana data directory
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: '0755'

# =============================================================================
# SECTION 4: CONFIGURATION
# Deploy grafana.ini and the Prometheus datasource provisioning file.
# =============================================================================

- name: Deploy Grafana configuration (grafana.ini)
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: "{{ grafana_config_dir }}/grafana.ini"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: '0640'
  notify: Restart Grafana

- name: Create Grafana provisioning directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: '0755'
  loop:
    - "{{ grafana_config_dir }}/provisioning/datasources"
    - "{{ grafana_config_dir }}/provisioning/dashboards"

- name: Deploy Prometheus datasource provisioning
  ansible.builtin.template:
    src: datasource_prometheus.yml.j2
    dest: "{{ grafana_config_dir }}/provisioning/datasources/prometheus.yml"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: '0640'
  notify: Restart Grafana

# =============================================================================
# SECTION 5: SYSTEMD SERVICE
# =============================================================================

- name: Enable and start Grafana
  ansible.builtin.systemd:
    name: grafana-server
    enabled: true
    state: started
    daemon_reload: true

# =============================================================================
# SECTION 6: VERIFY AND ENFORCE CREDENTIALS
# =============================================================================

- name: Wait for Grafana to be reachable
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ grafana_port }}"
    timeout: 30

# grafana.ini admin_password is only read on first startup — enforce via CLI
# on every run so the vault value is always authoritative.
- name: Enforce Grafana admin password via CLI
  ansible.builtin.command:
    cmd: grafana-cli admin reset-admin-password "{{ grafana_admin_password }}"
  no_log: true
  changed_when: true

- name: Display Grafana access URL
  ansible.builtin.debug:
    msg: "Grafana is up — http://{{ ansible_host }}:{{ grafana_port }}"

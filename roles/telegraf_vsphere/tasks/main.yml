# =============================================================================
# roles/telegraf_vsphere/tasks/main.yml — Telegraf vSphere Exporter
# =============================================================================
# Replaces vmware_exporter (abandoned, broken on vCenter 7.x).
# Telegraf is actively maintained, supports vCenter 5.5–8.x.
#
# Flow:
#   vCenter → inputs.vsphere → Telegraf → outputs.prometheus_client :9273
#   Prometheus scrapes :9273 directly (no proxy mode, no relabeling)
# =============================================================================

---
# =============================================================================
# SECTION 1: REPOSITORY + INSTALL
# =============================================================================

# InfluxData now ships an influxdata-archive-keyring RPM as a dependency.
# That RPM itself requires GPG verification before it can install — creating
# a chicken-and-egg problem with rpm_key. gpgcheck=false is acceptable here
# since this is an internal home lab, not a production system.
- name: Add InfluxData repository
  ansible.builtin.yum_repository:
    name: influxdata
    description: InfluxData Repository - Stable
    baseurl: "https://repos.influxdata.com/stable/{{ ansible_architecture }}/main"
    gpgcheck: false
    enabled: true

- name: Install telegraf
  ansible.builtin.dnf:
    name: telegraf
    state: present

# =============================================================================
# SECTION 2: CONFIGURATION
# =============================================================================

- name: Deploy Telegraf vSphere config
  ansible.builtin.template:
    src: telegraf.conf.j2
    dest: /etc/telegraf/telegraf.conf
    owner: telegraf
    group: telegraf
    mode: '0640'
  no_log: true
  notify: Restart telegraf

# =============================================================================
# SECTION 3: FIREWALL
# =============================================================================

- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Open Telegraf prometheus_client port in firewalld
  ansible.posix.firewalld:
    port: "{{ telegraf_prometheus_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

# =============================================================================
# SECTION 4: SERVICE
# =============================================================================

- name: Enable and start Telegraf
  ansible.builtin.systemd:
    name: telegraf
    enabled: true
    state: started
    daemon_reload: true

# =============================================================================
# SECTION 5: VERIFY
# =============================================================================

- name: Wait for Telegraf prometheus_client port to be reachable
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ telegraf_prometheus_port }}"
    timeout: 30

- name: Display Telegraf status
  ansible.builtin.debug:
    msg: "Telegraf vSphere exporter is up — http://{{ inventory_hostname }}:{{ telegraf_prometheus_port }}/metrics"

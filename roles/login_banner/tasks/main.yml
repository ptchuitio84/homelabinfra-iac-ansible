# =============================================================================
# roles/login_banner/tasks/main.yml — Login Banner Deployment
# =============================================================================
# Deploys two banners:
#   /etc/motd        — shown after successful login (post-auth)
#   /etc/issue.net   — shown before authentication via sshd Banner directive
#
# Configures sshd to display /etc/issue.net pre-auth and reloads the service.
# =============================================================================

---
# OL9/RHEL: dynamic motd lives in /etc/motd.d/
# Debian: dynamic motd lives in /etc/update-motd.d/
# Remove whichever applies — our profile.d script is the sole banner source.
- name: Disable dynamic MOTD — RedHat (/etc/motd.d)
  ansible.builtin.file:
    path: /etc/motd.d
    state: absent
  when: ansible_os_family == "RedHat"

- name: Disable dynamic MOTD — Debian (/etc/update-motd.d)
  ansible.builtin.file:
    path: /etc/update-motd.d
    state: absent
  when: ansible_os_family == "Debian"

# Clear /etc/motd so PAM doesn't print a stale static banner before our script runs.
- name: Clear /etc/motd
  ansible.builtin.copy:
    content: ""
    dest: /etc/motd
    owner: root
    group: root
    mode: '0644'

# profile.d script runs at every interactive login — gathers live stats at login time.
- name: Deploy dynamic login banner (/etc/profile.d/00-banner.sh)
  ansible.builtin.template:
    src: banner.sh.j2
    dest: /etc/profile.d/00-banner.sh
    owner: root
    group: root
    mode: '0755'

- name: Deploy /etc/issue.net (pre-auth SSH banner)
  ansible.builtin.template:
    src: issue_net.j2
    dest: /etc/issue.net
    owner: root
    group: root
    mode: '0644'

- name: Set sshd Banner directive to /etc/issue.net
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Banner'
    line: 'Banner /etc/issue.net'
    state: present
    backup: true
  notify: Reload sshd

- name: Disable sshd PrintLastLog (cleans up login output)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PrintLastLog'
    line: 'PrintLastLog no'
    state: present
  notify: Reload sshd

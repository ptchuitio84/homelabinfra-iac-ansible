# =============================================================================
# roles/plex/defaults/main.yml — Plex Media Server Role Default Variables
# =============================================================================
# Deploys Plex Media Server on OL7.6 (yum, not dnf).
# Deployment blocked until port-channel (Arista) is in service.
#
# DISK LAYOUT:
#   OS disk (30GB) — boot + LVM root + swap
#   Data disk (60GB) — auto-detected, mounted at /var/lib/plexmediaserver
#   Media — served from TrueNAS NFS/CIFS mount (separate)
# =============================================================================

---
# Plex version — set to 'latest' or pin a specific version
# Download from: https://www.plex.tv/media-server-downloads/
# Update this URL when upgrading
plex_rpm_url: "https://downloads.plex.tv/plex-media-server-new/1.40.1.8227-c0dd5a73e/redhat/plexmediaserver-1.40.1.8227-c0dd5a73e.x86_64.rpm"

# System user Plex runs as (created by RPM install)
plex_user: plex
plex_group: plex

# Data directories
plex_data_dir: /var/lib/plexmediaserver
plex_config_dir: /var/lib/plexmediaserver/Library
plex_log_dir: /var/log/plexmediaserver

# Data disk filesystem (auto-detected by size)
plex_data_fstype: xfs

# Port Plex listens on
plex_port: 32400

# Media mount — TrueNAS share mounted here
plex_media_mount: /mnt/media
plex_media_nfs_server: CHANGEME          # Set to TrueNAS IP
plex_media_nfs_share: CHANGEME           # Set to NFS export path

# =============================================================================
# roles/plex/tasks/main.yml — Plex Media Server Deployment Tasks
# =============================================================================
# Target: hmpplxap002 — Dell PowerEdge R510, Oracle Linux 7.9
#
# PREREQUISITES:
#   - LVM volumes already mounted: /plx (vg01) and /data (vg00)
#     Fresh build: run playbooks/infra/lvm_provision_plex.yml first
#   - bond0 configured and connected to swplnet252 Port-Channel 6
#     Fresh build: run playbooks/linux/configure_plex_bond.yml first
#   - common role already applied (timezone, NTP, SELinux permissive, hostname)
# =============================================================================

---
# =============================================================================
# SECTION 1: ASSERT STORAGE IS READY
# Fail early if /plx is not mounted — no point proceeding without it.
# =============================================================================

- name: Assert /plx is mounted
  ansible.builtin.command:
    cmd: mountpoint -q /plx
  changed_when: false
  failed_when: false
  register: plx_mount_check

- name: Fail if /plx is not mounted
  ansible.builtin.fail:
    msg: >
      /plx is not mounted. Run playbooks/infra/lvm_provision_plex.yml first
      (fresh build) or investigate why the LVM volume is not available.
  when: plx_mount_check.rc != 0

# =============================================================================
# SECTION 2: USERS AND GROUPS
# Pre-create plex user/group before RPM install to lock in UID/GID.
# The RPM sees the user already exists and skips auto-creation.
# =============================================================================

- name: Create plex group (gid {{ plex_gid }})
  ansible.builtin.group:
    name: "{{ plex_group }}"
    gid: "{{ plex_gid }}"
    state: present

- name: Create plex user (uid {{ plex_uid }})
  ansible.builtin.user:
    name: "{{ plex_user }}"
    uid: "{{ plex_uid }}"
    group: "{{ plex_group }}"
    shell: /bin/bash
    home: /home/plex
    create_home: true
    comment: Plex Media Server
    state: present

- name: Create plexadmins group (gid {{ plex_admin_gid }})
  ansible.builtin.group:
    name: "{{ plex_admin_group }}"
    gid: "{{ plex_admin_gid }}"
    state: present

- name: Add members to plexadmins group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: "{{ plex_admin_group }}"
    append: true
  loop: "{{ plex_admin_members }}"
  # prtchuitio must already exist (created at OS install). Skip if missing.
  failed_when: false

# =============================================================================
# SECTION 3: PLEX YUM REPO AND INSTALL
# =============================================================================

- name: Add official Plex yum repository
  ansible.builtin.yum_repository:
    name: "{{ plex_repo_name }}"
    description: Plex Media Server
    baseurl: "{{ plex_repo_baseurl }}"
    gpgkey: "{{ plex_repo_gpgkey }}"
    gpgcheck: true
    enabled: true
    state: present

- name: Install plexmediaserver
  ansible.builtin.yum:
    name: plexmediaserver
    state: present

# =============================================================================
# SECTION 4: METADATA PERSISTENCE
# Move Plex app data off the OS disk to /plx/.plex so it survives rebuilds.
# /var/lib/plexmediaserver becomes a symlink to /plx/.plex.
# =============================================================================

- name: Create Plex metadata directory on /plx
  ansible.builtin.file:
    path: "{{ plex_metadata_dir }}"
    state: directory
    owner: "{{ plex_user }}"
    group: "{{ plex_group }}"
    mode: '0755'

- name: Check current state of /var/lib/plexmediaserver
  ansible.builtin.stat:
    path: "{{ plex_data_dir }}"
  register: plex_data_stat

- name: Migrate existing metadata to /plx/.plex (existing server — one-time)
  when:
    - plex_data_stat.stat.exists
    - not plex_data_stat.stat.islnk
  block:
    - name: Stop Plex before migration
      ansible.builtin.service:
        name: plexmediaserver
        state: stopped

    - name: Copy metadata to /plx/.plex
      ansible.builtin.command:
        cmd: cp -a {{ plex_data_dir }}/. {{ plex_metadata_dir }}/
        creates: "{{ plex_metadata_dir }}/Library"

    - name: Remove original metadata directory
      ansible.builtin.file:
        path: "{{ plex_data_dir }}"
        state: absent

    - name: Create symlink /var/lib/plexmediaserver → /plx/.plex
      ansible.builtin.file:
        src: "{{ plex_metadata_dir }}"
        dest: "{{ plex_data_dir }}"
        state: link

- name: Create symlink on fresh build (no existing data)
  ansible.builtin.file:
    src: "{{ plex_metadata_dir }}"
    dest: "{{ plex_data_dir }}"
    state: link
  when:
    - not plex_data_stat.stat.exists

# =============================================================================
# SECTION 5: DIRECTORIES AND PERMISSIONS
# =============================================================================

- name: Create Plex log directory
  ansible.builtin.file:
    path: "{{ plex_log_dir }}"
    state: directory
    owner: "{{ plex_user }}"
    group: "{{ plex_group }}"
    mode: '0755'

# Set ownership on /plx directory itself only — not recursive.
# /plx contains 10TB of media; recursive chown would take hours.
- name: Set ownership on /plx (directory only, not recursive)
  ansible.builtin.file:
    path: "{{ plex_media_dir }}"
    state: directory
    owner: "{{ plex_user }}"
    group: "{{ plex_admin_group }}"
    mode: '0775'

- name: Set ownership on /plx/.plex metadata directory
  ansible.builtin.file:
    path: "{{ plex_metadata_dir }}"
    state: directory
    owner: "{{ plex_user }}"
    group: "{{ plex_group }}"
    mode: '0755'

# =============================================================================
# SECTION 6: SELINUX
# Allow nginx to proxy to Plex (httpd → localhost:32400).
# Common role sets SELinux to permissive, but the boolean is good practice.
# =============================================================================

- name: Allow nginx to connect to Plex (SELinux boolean)
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true

# =============================================================================
# SECTION 7: PLEX CONFIGURATION
# Deploy Preferences.xml only on fresh builds — never overwrite a running server.
# The claim token is one-time use; get a fresh one at https://www.plex.tv/claim/
# =============================================================================

- name: Create Plex config directory
  ansible.builtin.file:
    path: "{{ plex_config_dir }}"
    state: directory
    owner: "{{ plex_user }}"
    group: "{{ plex_group }}"
    mode: '0755'

- name: Deploy Preferences.xml (fresh install only — never overwrites)
  ansible.builtin.template:
    src: Preferences.xml.j2
    dest: "{{ plex_config_dir }}/Preferences.xml"
    owner: "{{ plex_user }}"
    group: "{{ plex_group }}"
    mode: '0644'
    force: false

# =============================================================================
# SECTION 8: NGINX REVERSE PROXY
# Proxies port 80 → 127.0.0.1:32400 with websocket support.
# =============================================================================

- name: Install nginx
  ansible.builtin.yum:
    name: nginx
    state: present

- name: Deploy Plex nginx reverse proxy config
  ansible.builtin.template:
    src: plex.conf.j2
    dest: /etc/nginx/conf.d/plex.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart nginx

- name: Set nginx server_names_hash_bucket_size
  ansible.builtin.lineinfile:
    path: /etc/nginx/nginx.conf
    insertafter: 'include /etc/nginx/conf.d/\*.conf;'
    line: '    server_names_hash_bucket_size 64;'
    regexp: 'server_names_hash_bucket_size'

- name: Enable and start nginx
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started

# =============================================================================
# SECTION 9: PLEX SERVICE
# =============================================================================

- name: Enable and start Plex Media Server
  ansible.builtin.service:
    name: plexmediaserver
    enabled: true
    state: started

# =============================================================================
# SECTION 10: VERIFY
# =============================================================================

- name: Wait for Plex to be reachable on port {{ plex_port }}
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ plex_port }}"
    timeout: 60

- name: Post-install summary
  ansible.builtin.debug:
    msg:
      - "Plex is up — http://{{ ansible_host }}:{{ plex_port }}/web"
      - "nginx proxy  — http://{{ plex_nginx_server_name }}"
      - ""
      - "FRESH BUILD NEXT STEPS:"
      - "  1. Open http://{{ ansible_host }}:{{ plex_port }}/web in a browser"
      - "  2. Sign in and claim the server (token in Preferences.xml expires — use web UI if already expired)"
      - "  3. Add media libraries pointing to /plx/<category>"

# =============================================================================
# group_vars/cisco_switches/vars.yml — Cisco Switch Connection Settings
# =============================================================================
# These variables apply to EVERY host in the "cisco_switches" group.
# They tell Ansible HOW to connect to and authenticate with Cisco IOS devices.
#
# ENCRYPTED CREDENTIALS:
# Passwords are stored in vault.yml (encrypted with ansible-vault).
# The {{ vault_* }} references below pull from that file at runtime.
# Never hardcode passwords here — this file is committed to git.
#
# LEGACY CIPHER NOTE:
# The Catalyst 3750G runs IOS 12.2, which only supports older SSH encryption
# algorithms that modern clients disable by default. The ssh_common_args below
# re-enables them scoped to this group only.
# =============================================================================

---
# Which network platform this is — loads the correct IOS command syntax and parser.
ansible_network_os: cisco.ios.ios

# Connection method: network_cli opens an SSH terminal session to the switch,
# just like a human typing at the CLI prompt.
ansible_connection: ansible.netcommon.network_cli

# Force paramiko as the SSH backend. ansible-pylibssh is installed on this control
# node but cannot negotiate the legacy KEX/ciphers that IOS 12.2 requires.
# paramiko supports them natively and direct connection tests confirm it works.
# Valid values: paramiko, libssh, auto (auto prefers libssh when installed).
ansible_network_cli_ssh_type: paramiko

# IOS 12.2 only supports ssh-rsa for host key verification.
# Ansible's paramiko plugin defaults to offering rsa-sha2-256/512 first,
# which IOS 12.2 cannot negotiate. This disables rsa-sha2 so paramiko
# falls back to plain ssh-rsa — the only algorithm the switch supports.
ansible_paramiko_use_rsa_sha2_algorithms: false

# Prevent paramiko from trying private keys in ~/.ssh/ before the password.
# ans001 has 3 ed25519 keys. IOS 12.2 max auth retries = 3. All three key
# attempts fail (switch doesn't support ed25519), exhausting retry budget
# before the password ever gets tried. look_for_keys=False fixes this.
ansible_paramiko_look_for_keys: false

# SSH login username (must have privilege 15 on the switch).
ansible_user: ptchuitio

# SSH password — decrypted at runtime from vault.yml.
ansible_password: "{{ vault_cisco_password }}"

# Privilege escalation: on Cisco IOS, "become" means entering "enable" mode
# (required to make any configuration changes beyond show commands).
ansible_become: true
ansible_become_method: enable
ansible_become_password: "{{ vault_cisco_enable_password }}"

# Legacy SSH cipher flags required for IOS 12.2 compatibility.
# Modern OpenSSH drops these algorithms by default — this re-enables them
# only for this group so other hosts are unaffected.
#
#   KexAlgorithms    — how the shared session key is negotiated
#   HostKeyAlgorithms — the format of the switch's public host key
#   Ciphers          — encryption algorithm for session data
ansible_ssh_common_args: >-
  -o KexAlgorithms=+diffie-hellman-group14-sha1,diffie-hellman-group1-sha1
  -o HostKeyAlgorithms=+ssh-rsa
  -o Ciphers=+aes128-cbc,3des-cbc,aes192-cbc,aes256-cbc
  -o RequiredRSASize=512

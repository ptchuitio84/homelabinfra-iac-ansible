# =============================================================================
# inventory/network/arista_switches.yml — Arista Switch Inventory
# =============================================================================
# Defines the Arista switches Ansible can manage.
#
# GROUP: arista_switches
# All hosts listed here inherit the connection settings defined in:
#   inventory/group_vars/arista_switches/vars.yml  (eAPI connection settings)
#   inventory/group_vars/arista_switches/vault.yml (encrypted credentials)
#
# Arista switches are managed via eAPI (HTTPS REST API) — NOT SSH.
# This is faster, more reliable, and the Arista-recommended method.
# eAPI is already enabled on both switches under: management api http-commands
# =============================================================================

---
arista_switches:
  hosts:

    # swplnet252 — Arista 7050SX-64
    # Location: Home lab network rack
    # Role:     VRRP master L3 switch (priority 110), all traffic flows through here
    # Ports:    48x 10GbE SFP+ (Ethernet1-48), 4x 40GbE QSFP+ (Ethernet49-52)
    # Mgmt IP:  10.100.100.252 (VLAN 100 — COREMGMTNET)
    # eAPI:     http://10.100.100.252:80  (HTTP — Mac OpenSSL rejects EOS self-signed TLS)
    swplnet252.nnt.com:
      ansible_host: 10.100.100.252

    # swplnet253 — Arista 7048T-A
    # Location: Home lab network rack
    # Role:     VRRP secondary L3 switch (priority 100), 1GbE server uplinks
    # Ports:    48x 1GbE RJ45 (Ethernet1-48), 4x 10GbE SFP+ (Ethernet49-52)
    # Mgmt IP:  10.100.100.253 (VLAN 100 — COREMGMTNET)
    # Uplinks:  Po1 (10GbE DAC) → swplnet252, Po2 (1GbE) → swplnet251
    swplnet253.nnt.com:
      ansible_host: 10.100.100.253

    # swplnet251 (Arista 7048T-A) — uncomment if/when Cisco 3750G is decommissioned
    # swplnet251.nnt.com:
    #   ansible_host: 10.100.100.251

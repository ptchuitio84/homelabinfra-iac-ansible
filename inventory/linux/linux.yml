# =============================================================================
# inventory/linux/linux.yml — Linux Parent Group
# =============================================================================
# Aggregates all Linux host groups under a single "linux" group.
# Use this as the target for fleet-wide Linux playbooks (banners, hardening, etc.)
#
# USAGE:
#   ansible-playbook playbooks/linux/setup_login_banner.yml \
#     --vault-password-file ~/.ansible/vault_pass.txt
# =============================================================================

---
linux:
  children:
    ansible_nodes:
    jenkins:
    monitoring:
    netbox:
    nfs_servers:
    registry:
    vault_servers:
    plex_servers:
    # mailcleaner excluded — Debian Squeeze / Python 2.6 / OpenSSH 5.5, not compatible with ansible-core
    # Manage manually via: ssh mailcleaner
